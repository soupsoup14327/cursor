<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мини-сайт с карточками</title>
    <script>
      // БЫСТРЫЙ редирект на реальный контент в `docs/`
      window.location.replace("./docs/index.html");

    <style>
      :root {
        --bg: #ffffff;
        --text: #1c1c1e;
        --muted: #6e6e73;
        --card-bg: #f7f7f7;
        --card-border: #e5e5ea;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
        --radius: 14px;
        --icon: #0a66ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
        line-height: 1.45;
      }

      .container {
        width: min(1040px, 100%);
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      header {
        padding-top: 6px;
        padding-bottom: 6px;
        display: flex;
        flex-direction: column;
        gap: 40px;
      }

      .kicker {
        display: inline-block;
        padding: 6px 10px;
        border: 1px solid var(--card-border);
        border-radius: 999px;
        font-size: 13px;
        color: var(--muted);
        background: #fafafa;
        margin: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 44px);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 16.5px;
        max-width: 72ch;
      }

      .cards {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      @media (max-width: 760px) {
        .cards {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 16px 16px 18px;
        box-shadow: var(--shadow);
      }

      .card__top {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        flex: 0 0 auto;
        color: var(--icon);
      }

      .icon svg {
        width: 22px;
        height: 22px;
        display: block;
      }

      h2 {
        margin: 0;
        font-size: 17px; /* subtitle */
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .content {
        margin-top: 8px; /* HIG-style vertical rhythm */
      }

      .body {
        margin: 6px 0 0; /* body */
        color: var(--muted);
        font-size: 14.8px;
      }
    </style>
  </head>
  <body><!--
    <div class="container">
      <header>
        <div class="kicker">HIG-inspired</div>
        <div class="title-block">
          <h1>Сайт с заголовком и четырьмя карточками</h1>
          <p class="subtitle">
            Белый фон, аккуратные отступы, мягкие серые карточки и понятная иерархия текста.
            Всё сделано на одном HTML-файле.
          </p>
        </div>
      </header>

      <main class="cards" aria-label="Карточки возможностей">

                для разработчика — предсказуемая структура.
              </p>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="card__top">
            <div class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path

                />
              </svg>
            </div>
            <div class="content">
              <h2>Модульность</h2>
              <p class="body">
                Каждая карточка состоит из “иконка → подзаголовок → текст”. Их легко менять местами или
                дополнять без поломки визуального баланса.
              </p>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="card__top">
            <div class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                <path
                  stroke="currentColor"
                  stroke-width="2"

                  d="M12 22a10 10 0 1 0-10-10 10 10 0 0 0 10 10Z"
                />
                <path
                  stroke="currentColor"

                  d="M14.8 9.2 9.5 11.3l-2.1 5.3 5.3-2.1 2.1-5.3Z"
                />
              </svg>
            </div>
            <div class="content">
              <h2>Четкая навигация</h2>
              <p class="body">
                Семантика (`header`, `main`, `article`) помогает поддерживать порядок в коде и улучшает доступность
                для экранных читалок.
              </p>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="card__top">
            <div class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                <path
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"
                />
                <path
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 19h.01"
                />
              </svg>
            </div>
            <div class="content">
              <h2>Адаптивность</h2>
              <p class="body">
                На мобильных карточки перестраиваются в один столбец — читать и скроллить комфортно,
                а отступы остаются “воздушными”.
              </p>
            </div>
          </div>
        </article>
      </main>
    </div>
  --></body>
</html>
