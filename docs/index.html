<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Binrobi — смартфон, за который не надо платить</title>
    <meta name="color-scheme" content="light" />
    <meta name="description" content="Binrobi — смартфон, за который не надо платить. Забронируйте или узнайте больше." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/tokens.css?v=1" />
    <link rel="stylesheet" href="assets/styles/binrobi.css?v=1" />
  </head>
  <body class="binrobi-page">
    <div class="binrobi-shell">
      <header class="binrobi-header">
        <a class="binrobi-brand" href="#top" id="top">
          <span class="binrobi-brand__mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="3.5" y="3.5" width="17" height="17" rx="2" stroke="currentColor" stroke-width="1.5" />
              <line x1="7" y1="17" x2="17" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
          </span>
          <span class="binrobi-brand__word">binrobi</span>
        </a>
      </header>

      <main class="binrobi-main">
        <section class="binrobi-hero" aria-labelledby="binrobi-heading">
          <div class="binrobi-hero__visual">
            <img
              class="binrobi-hero__img"
              src="assets/images/binrobi-hero.png"
              alt="Человек держит смартфон Binrobi"
              decoding="async"
              fetchpriority="high"
            />
          </div>
          <div class="binrobi-hero__content">
            <h1 class="binrobi-hero__title" id="binrobi-heading">Binrobi</h1>
            <p class="binrobi-hero__slogan">
              смартфон, за который<br />
              не надо платить
            </p>
            <div class="binrobi-hero__links">
              <a href="#">Забронировать</a>
              <a href="#">О смартфоне</a>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
